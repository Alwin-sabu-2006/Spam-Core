<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
    <defs>
        <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38bdf8" />
            <stop offset="50%" stop-color="#06b6d4" />
            <stop offset="100%" stop-color="#10b981" />
        </linearGradient>
        <linearGradient id="innerGrad" x1="0%" y1="100%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#0a0d14" />
            <stop offset="100%" stop-color="#0f131c" />
        </linearGradient>
        <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="rgba(56, 189, 248, 0.4)" />
            <stop offset="100%" stop-color="rgba(16, 185, 129, 0.1)" />
        </linearGradient>
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    <!-- Ambient Shield Glow Background -->
    <path d="M 50,12 L 85,22 C 85,55 70,82 50,92 C 30,82 15,55 15,22 Z" 
          fill="url(#glowGrad)" opacity="0.15" filter="url(#glow)" />

    <!-- Outer Glowing Shield Border -->
    <path d="M 50,12 L 85,22 C 85,55 70,82 50,92 C 30,82 15,55 15,22 Z" 
          stroke="url(#shieldGrad)" stroke-width="3" filter="url(#glow)" stroke-linejoin="round" />
          
    <!-- Inner Dark Shield Body -->
    <path d="M 50,16 L 81,25 C 81,52 68,77 50,86 C 32,77 19,52 19,25 Z" 
          fill="url(#innerGrad)" stroke="#1e2530" stroke-width="1.5" />
          
    <!-- Scanning Rings / Radar Lines -->
    <circle cx="50" cy="46" r="18" stroke="rgba(56, 189, 248, 0.15)" stroke-width="1.2" stroke-dasharray="6 3" />
    <circle cx="50" cy="46" r="12" stroke="rgba(16, 185, 129, 0.25)" stroke-width="1" />
    
    <!-- Central Grid Dots (Tech visualizer) -->
    <circle cx="50" cy="46" r="3" fill="#38bdf8" opacity="0.3" />
    
    <!-- Shield Core Pulse/Checkmark -->
    <path d="M 42,46 L 47,51 L 58,40" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
    
    <!-- Tech ticks/decorations on the shield -->
    <path d="M 50,16 L 50,22" stroke="rgba(56, 189, 248, 0.4)" stroke-width="1.5" stroke-linecap="round" />
    <path d="M 50,86 L 50,80" stroke="rgba(16, 185, 129, 0.4)" stroke-width="1.5" stroke-linecap="round" />
</svg>
